<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Media Landing Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Connect With Me</h1>
    <p>Follow my profiles and message me directly</p>

    <a class="btn social" href="https://github.com/yourusername" target="_blank">
      GitHub
    </a>

    <a class="btn social" href="https://linkedin.com/in/yourusername" target="_blank">
      LinkedIn
    </a>

    <a class="btn social" href="https://instagram.com/yourusername" target="_blank">
      Instagram
    </a>

    <a class="btn social" href="https://facebook.com/yourusername" target="_blank">
      Facebook
    </a>

    <button class="btn whatsapp" id="whatsappBtn">
      Message on WhatsApp
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
